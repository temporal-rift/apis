asyncapi: 3.0.0
info:
  title: Action events
  version: 1.0.0
  description: Action module domain events published to game.events

servers:
  kafka:
    host: localhost:9092
    protocol: kafka

channels:
  gameEvents:
    address: game.events
    messages:
      actionRoundStarted:
        $ref: '#/components/messages/ActionRoundStarted'
      cardPlayed:
        $ref: '#/components/messages/CardPlayed'
      specialActionPlayed:
        $ref: '#/components/messages/SpecialActionPlayed'
      actionRoundTimerExpired:
        $ref: '#/components/messages/ActionRoundTimerExpired'
      playerSkipped:
        $ref: '#/components/messages/PlayerSkipped'
      actionRoundClosed:
        $ref: '#/components/messages/ActionRoundClosed'
      roundSummaryPublished:
        $ref: '#/components/messages/RoundSummaryPublished'
      eventsDrawn:
        $ref: '#/components/messages/EventsDrawn'
      handDealt:
        $ref: '#/components/messages/HandDealt'

operations:
  publishActionRoundStarted:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/actionRoundStarted' } ]
  publishCardPlayed:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/cardPlayed' } ]
  publishSpecialActionPlayed:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/specialActionPlayed' } ]
  publishActionRoundTimerExpired:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/actionRoundTimerExpired' } ]
  publishPlayerSkipped:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/playerSkipped' } ]
  publishActionRoundClosed:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/actionRoundClosed' } ]
  publishRoundSummaryPublished:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/roundSummaryPublished' } ]
  publishEventsDrawn:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/eventsDrawn' } ]
  publishHandDealt:
    action: send
    channel: { $ref: '#/channels/gameEvents' }
    messages: [ { $ref: '#/channels/gameEvents/messages/handDealt' } ]

components:
  messages:
    ActionRoundStarted:
      name: ActionRoundStarted
      title: Action round started
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/ActionRoundStartedPayload' }
    CardPlayed:
      name: CardPlayed
      title: Card played
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/CardPlayedPayload' }
    SpecialActionPlayed:
      name: SpecialActionPlayed
      title: Special action played
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/SpecialActionPlayedPayload' }
    ActionRoundTimerExpired:
      name: ActionRoundTimerExpired
      title: Action round timer expired
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/ActionRoundTimerExpiredPayload' }
    PlayerSkipped:
      name: PlayerSkipped
      title: Player skipped
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/PlayerSkippedPayload' }
    ActionRoundClosed:
      name: ActionRoundClosed
      title: Action round closed
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/ActionRoundClosedPayload' }
    RoundSummaryPublished:
      name: RoundSummaryPublished
      title: Round summary published
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/RoundSummaryPublishedPayload' }
    EventsDrawn:
      name: EventsDrawn
      title: Events drawn
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/EventsDrawnPayload' }
    HandDealt:
      name: HandDealt
      title: Hand dealt
      headers: { $ref: '#/components/schemas/EventEnvelopeHeaders' }
      payload: { $ref: '#/components/schemas/HandDealtPayload' }

  schemas:
    EventEnvelopeHeaders:
      $ref: './shared/envelope-headers.yaml#/EventEnvelopeHeaders'

    ActionRoundStartedPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        timerSeconds: { type: integer }
        pendingPlayerIds:
          type: array
          items: { type: string, format: uuid }
      required: [ gameId, eraNumber, roundNumber, timerSeconds, pendingPlayerIds ]

    CardPlayedPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        playerId: { type: string, format: uuid }
        cardInstanceId: { type: string, format: uuid }
        cardType: { $ref: '#/components/schemas/CardType' }
        targetEventId: { type: string, format: uuid }
        sourceOutcomeId: { type: string, format: uuid }
        targetOutcomeId: { type: string, format: uuid }
      required: [ gameId, eraNumber, roundNumber, playerId, cardInstanceId, cardType, targetEventId ]

    SpecialActionPlayedPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        playerId: { type: string, format: uuid }
        faction: { $ref: '#/components/schemas/Faction' }
        specialAction: { $ref: '#/components/schemas/SpecialAction' }
        targetEventId: { type: string, format: uuid }
        targetOutcomeId: { type: string, format: uuid }
        targetPlayerId: { type: string, format: uuid }
      required: [ gameId, eraNumber, roundNumber, playerId, faction, specialAction, targetEventId, targetOutcomeId ]

    ActionRoundTimerExpiredPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        missingPlayerIds:
          type: array
          items: { type: string, format: uuid }
      required: [ gameId, eraNumber, roundNumber, missingPlayerIds ]

    PlayerSkippedPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        playerId: { type: string, format: uuid }
        reason: { type: string }
      required: [ gameId, eraNumber, roundNumber, playerId, reason ]

    ActionRoundClosedPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        closedReason: { type: string }
        totalActions: { type: integer }
      required: [ gameId, eraNumber, roundNumber, closedReason, totalActions ]

    ActionSummary:
      type: object
      properties:
        playerId: { type: string, format: uuid }
        actionCategory: { type: string }
        actionFamily: { type: string }
        skipped: { type: boolean }
      required: [ playerId, actionCategory, actionFamily, skipped ]

    RoundSummaryPublishedPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        roundNumber: { type: integer }
        actionSummaries:
          type: array
          items: { $ref: '#/components/schemas/ActionSummary' }
      required: [ gameId, eraNumber, roundNumber, actionSummaries ]

    EventsDrawnOutcome:
      type: object
      properties:
        outcomeId: { type: string, format: uuid }
        description: { type: string }
        initialProbability: { type: integer }
      required: [ outcomeId, description, initialProbability ]

    EventsDrawnFutureEvent:
      type: object
      properties:
        eventId: { type: string, format: uuid }
        title: { type: string }
        outcomes:
          type: array
          items: { $ref: '#/components/schemas/EventsDrawnOutcome' }
        isCascaded: { type: boolean }
      required: [ eventId, title, outcomes, isCascaded ]

    EventsDrawnPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        events:
          type: array
          items: { $ref: '#/components/schemas/EventsDrawnFutureEvent' }
      required: [ gameId, eraNumber, events ]

    HandDealtCardInstance:
      type: object
      properties:
        cardInstanceId: { type: string, format: uuid }
        cardType: { $ref: '#/components/schemas/CardType' }
      required: [ cardInstanceId, cardType ]

    HandDealtPayload:
      type: object
      properties:
        gameId: { type: string, format: uuid }
        eraNumber: { type: integer }
        playerId: { type: string, format: uuid }
        cards:
          type: array
          items: { $ref: '#/components/schemas/HandDealtCardInstance' }
      required: [ gameId, eraNumber, playerId, cards ]

    CardType:
      $ref: './shared/enums.yaml#/CardType'

    Faction:
      $ref: './shared/enums.yaml#/Faction'

    SpecialAction:
      $ref: './shared/enums.yaml#/SpecialAction'
