name: Publish API contracts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.list.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: list
        run: |
          # Every top-level directory with its own pom.xml is a bounded-context module.
          MODULES=$(find . -mindepth 2 -maxdepth 2 -name pom.xml -exec dirname {} \; | sed 's|^\./||' | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES" >> "$GITHUB_OUTPUT"
          echo "Discovered modules: $MODULES"

  publish:
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          java-version: 26
          java-distribution: temurin
          maven-version: 3.9.13
          settings-servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.SONATYPE_USERNAME }}",
                "password": "${{ secrets.SONATYPE_PASSWORD }}"
              }
            ]

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Check if module version already published
        id: version_check
        env:
          MODULE: ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          echo "--- Resolving $MODULE groupId + artifactId + version ---"
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -DforceStdout -q -N)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -DforceStdout -q -N)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -DforceStdout -q -N)
          echo "Resolved: $GROUP_ID:$ARTIFACT_ID:$VERSION"

          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::$MODULE has a SNAPSHOT version ($VERSION) — Maven Central does not accept SNAPSHOTs."
            exit 1
          fi

          echo "ARTIFACT_ID=$ARTIFACT_ID" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
          REGISTRY_URL="https://repo1.maven.org/maven2/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}/${ARTIFACT_ID}-${VERSION}.pom"
          echo "--- Checking Maven Central ---"
          echo "URL: $REGISTRY_URL"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L --retry 3 --retry-delay 5 --retry-connrefused "$REGISTRY_URL")
          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "Version $VERSION already exists in Maven Central — skipping publish"
            echo "VERSION_CHANGED=false" >> "$GITHUB_ENV"
          elif [ "$RESPONSE" = "404" ]; then
            echo "Version $VERSION not found in Maven Central — will publish"
            echo "VERSION_CHANGED=true" >> "$GITHUB_ENV"
          else
            echo "::error::Unexpected HTTP status $RESPONSE checking Maven Central for $MODULE — aborting rather than risking a false publish."
            exit 1
          fi

      - name: Publish module to Maven Central
        if: env.VERSION_CHANGED == 'true'
        env:
          MODULE: ${{ matrix.module }}
        run: mvn --batch-mode -pl "$MODULE" deploy -Pcentral

      - name: Create and push tag
        if: env.VERSION_CHANGED == 'true'
        env:
          MODULE: ${{ matrix.module }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          TAG="$MODULE/v${VERSION}"
          git tag "$TAG"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/temporal-rift/apis.git" "$TAG"
